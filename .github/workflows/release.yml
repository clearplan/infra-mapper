name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify index.html matches infra-mapper.html
        run: |
          if ! diff -q infra-mapper.html index.html > /dev/null 2>&1; then
            echo "::error::index.html and infra-mapper.html are out of sync at tag ${GITHUB_REF_NAME}. The GitHub Pages site (which serves index.html) would not match this release. Re-run _assemble.ps1, commit both files, and re-tag."
            exit 1
          fi

      - name: Extract changelog section
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          awk -v ver="## [$VERSION]" '
            index($0, ver) == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry found for $VERSION." > release_notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          generate_release_notes: true
          files: infra-mapper.html
